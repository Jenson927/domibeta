name: 🚀 Auto Version Bump

on:
  push:
    branches: [main]
    paths-ignore:
      - '.github/workflows/**'

permissions:
  contents: write

jobs:
  update-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Show current version
        run: |
          echo "=== Current index.html version line ==="
          grep -n 'about-version' index.html
          echo "=== Extracted version ==="
          VERSION=$(grep -oP 'id="about-version">V\K[0-9.]+' index.html)
          echo "Found version: $VERSION"
          echo "current=$VERSION" >> $GITHUB_OUTPUT

      - name: Increment patch version
        id: increment
        run: |
          CURRENT="${{ steps.version.outputs.current }}"
          echo "Current version: $CURRENT"
          IFS='.' read -ra VERSION_PARTS <<< "$CURRENT"
          PATCH=$((VERSION_PARTS[2] + 1))
          NEW_VERSION="V${VERSION_PARTS[0]}.${VERSION_PARTS[1]}.$PATCH"
          echo "New version: $NEW_VERSION"
          echo "new=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Update version in HTML
        run: |
          echo "=== Before sed ==="
          grep 'about-version' index.html
          sed -i "s/id=\"about-version\">V[0-9.]*</id=\"about-version\">\${{ steps.increment.outputs.new }}</" index.html
          echo "=== After sed ==="
          grep 'about-version' index.html

      - name: Commit and push
        run: |
          echo "=== Git status ==="
          git status
          echo "=== Git config ==="
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          echo "=== Git diff ==="
          git diff index.html | head -20
          git add index.html
          echo "=== Git commit ==="
          git commit -m "chore: bump version to ${{ steps.increment.outputs.new }}" || echo "No changes to commit"
          echo "=== Git push ==="
          git push || echo "Push failed - checking if already at latest"